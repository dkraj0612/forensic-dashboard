<!DOCTYPE html>
<html lang="en" class="h-full bg-[#121212] text-zinc-100 antialiased">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FORENSIC STUDIO</title>
    
    <!-- Core Engine Scripts -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/localforage@1.10.0/dist/localforage.min.js"></script>
    <script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>
    
    <link rel="stylesheet" href="CSS/styles.css">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'kite-bg': '#121212',
                        'kite-panel': '#1c1c1e',
                        'kite-border': '#2c2c2e',
                        'kite-blue': '#437efd',
                        'kite-green': '#00b067',
                        'kite-red': '#eb5757',
                        'kite-orange': '#ff9500'
                    },
                    fontFamily: { 
                        sans: ['Inter', 'sans-serif'] 
                    }
                }
            }
        }
    </script>
</head>
<body class="h-full flex flex-col overflow-hidden select-none font-sans bg-kite-bg">

    <!-- TOAST CONTAINER -->
    <div id="toast-container" class="fixed top-4 right-4 flex flex-col gap-2 z-[9999] pointer-events-none"></div>

    <!-- MAIN APP CONTAINER -->
    <div id="main-app" class="flex-1 flex w-full h-full overflow-hidden relative">
        
        <!-- MOBILE SIDEBAR BACKDROP -->
        <div id="sidebar-backdrop" class="absolute inset-0 bg-black/60 backdrop-blur-sm z-30 hidden md:hidden transition-opacity opacity-0 duration-300"></div>

        <!-- SIDEBAR -->
        <aside id="global-sidebar" class="absolute inset-y-0 left-0 z-40 w-[80vw] max-w-[280px] md:w-72 border-r border-kite-border bg-kite-panel flex flex-col transform -translate-x-full md:relative md:translate-x-0 transition-transform duration-300 shrink-0">
            <div class="h-14 border-b border-kite-border flex items-center justify-between px-4 shrink-0">
                <div class="flex items-center gap-2">
                    <i class="ph-bold ph-crosshair text-kite-blue text-lg animate-pulse"></i>
                    <span class="font-black text-sm tracking-widest text-zinc-100 uppercase">FORENSIC//STUDIO</span>
                </div>
                <!-- Mobile Close Button -->
                <button id="mobile-close-sidebar" class="md:hidden text-zinc-400 hover:text-zinc-100 p-1 focus:outline-none">
                    <i class="ph-bold ph-x text-lg"></i>
                </button>
            </div>

            <!-- Autocomplete Controller -->
            <div class="p-3 border-b border-kite-border bg-kite-bg/50 relative shrink-0">
                <div class="relative">
                    <i class="ph ph-magnifying-glass absolute left-3 top-2.5 text-zinc-500"></i>
                    <input type="text" id="new-stock-input" class="w-full rounded border border-kite-border bg-kite-bg pl-9 pr-3 py-1.5 text-[16px] md:text-xs text-zinc-200 placeholder-zinc-500 focus:border-kite-blue focus:outline-none" placeholder="Search or add instrument..." autocomplete="off">
                </div>
                <div id="autocomplete-dropdown" class="absolute left-3 right-3 top-full mt-1 z-50 rounded border border-kite-border bg-kite-panel shadow-2xl max-h-48 overflow-y-auto hidden"></div>
            </div>

            <div class="px-4 py-2 border-b border-kite-border bg-kite-bg/30 flex justify-between items-center text-[10px] font-mono uppercase tracking-widest text-zinc-500 shrink-0">
                <span>Local Sessions</span>
                <span id="sync-badge" class="text-kite-green flex items-center gap-1">
                    <i class="ph ph-check-circle"></i> Synced
                </span>
            </div>

            <div id="session-list" class="flex-1 overflow-y-auto custom-scrollbar p-2 space-y-1"></div>

            <div class="p-3 border-t border-kite-border shrink-0">
                <button id="new-chat-btn" class="w-full flex items-center justify-center gap-2 bg-kite-blue/10 hover:bg-kite-blue/20 text-kite-blue border border-kite-blue/30 px-3 py-2 rounded transition-colors text-xs font-semibold focus:outline-none">
                    <i class="ph ph-plus font-bold"></i> New Analysis
                </button>
            </div>
        </aside>

        <!-- MAIN WORKSPACE -->
        <main class="flex-1 flex flex-col h-full w-full bg-kite-bg relative overflow-hidden">
            
            <!-- RESPONSIVE HEADER -->
            <header class="h-14 border-b border-kite-border bg-kite-panel flex items-center justify-between px-2 md:px-4 z-20 shrink-0 gap-1">
                <div class="flex items-center gap-1 md:gap-3 flex-1 min-w-0">
                    <!-- Hamburger Menu Button -->
                    <button id="mobile-menu-btn" class="md:hidden p-1.5 text-zinc-400 hover:text-zinc-100 focus:outline-none shrink-0">
                        <i class="ph-bold ph-list text-xl"></i>
                    </button>

                    <select id="watchlist-dropdown" class="bg-kite-bg border border-kite-border rounded px-2 py-1.5 text-[10px] md:text-xs text-zinc-200 focus:outline-none focus:border-kite-blue w-28 md:w-48 font-mono appearance-none cursor-pointer truncate shrink-0">
                        <option value="">No Active Target</option>
                    </select>
                    
                    <nav class="flex items-center border border-kite-border rounded p-0.5 bg-kite-bg shrink-0">
                        <button id="mode-general" class="px-2 md:px-3 py-1 rounded text-[10px] md:text-[11px] font-semibold transition-all bg-kite-border text-zinc-100">
                            GEN
                        </button>
                        <button id="mode-forensic" class="px-2 md:px-3 py-1 rounded text-[10px] md:text-[11px] font-semibold transition-all text-zinc-400 hover:text-zinc-200">
                            AUDIT
                        </button>
                    </nav>

                    <button id="run-radar-btn" class="px-2 py-1.5 md:px-3 md:py-1.5 rounded text-[10px] md:text-[11px] font-semibold transition-all bg-kite-orange/10 text-kite-orange border border-kite-orange/20 flex items-center gap-1 hover:bg-kite-orange/20 shrink-0">
                        <i class="ph-bold ph-broadcast animate-pulse text-sm"></i>
                        <span class="hidden md:inline">Radar</span>
                    </button>
                </div>

                <div class="flex items-center gap-1 md:gap-3 shrink-0">
                    <button id="download-db-btn" title="Export Context" class="p-1.5 rounded border border-kite-border text-zinc-400 hover:text-zinc-100 bg-kite-bg transition-colors focus:outline-none">
                        <i class="ph-bold ph-download-simple text-sm md:text-base"></i>
                    </button>
                    
                    <button id="settings-btn" title="Open Settings" class="p-1.5 rounded border border-kite-border text-zinc-400 hover:text-zinc-100 bg-kite-bg transition-colors focus:outline-none">
                        <i class="ph-bold ph-sliders text-sm md:text-base"></i>
                    </button>
                    
                    <button id="logout-btn" title="Factory Reset Memory" class="h-6 w-6 md:h-7 md:w-7 rounded-full bg-kite-border border border-zinc-700 flex items-center justify-center focus:outline-none ml-1 hover:bg-zinc-800 transition-colors">
                        <i class="ph-bold ph-power text-xs text-kite-red"></i>
                    </button>
                </div>
            </header>

            <!-- CHAT STREAM CANVAS -->
            <div id="chat-container" class="flex-1 overflow-y-auto custom-scrollbar p-3 md:p-6 space-y-4 md:space-y-6 pb-28 md:pb-32 w-full">
                <div id="welcome-screen" class="flex flex-col items-center justify-center h-full text-center opacity-50 px-4">
                    <i class="ph ph-terminal-window text-5xl md:text-6xl text-zinc-600 mb-2 md:mb-4"></i>
                    <h2 class="text-[10px] md:text-xs font-mono tracking-widest text-zinc-400 uppercase">Omni-Engine Ready</h2>
                </div>
            </div>

            <!-- PROMPT FOOTER -->
            <footer class="absolute bottom-0 w-full bg-kite-panel/90 backdrop-blur border-t border-kite-border p-2 md:p-4 pb-[max(0.5rem,env(safe-area-inset-bottom))]">
                <form id="search-form" class="max-w-4xl mx-auto flex gap-2 md:gap-3 relative items-end bg-kite-bg border border-kite-border rounded-lg p-1.5 focus-within:border-kite-blue transition-colors shadow-inner">
                    <textarea id="search-input" rows="1" placeholder="Inquire asset footprints or execute structural trace..." required class="flex-1 bg-transparent resize-none focus:outline-none text-[16px] md:text-sm text-zinc-100 placeholder:text-zinc-600 py-1.5 md:py-2 px-2 custom-scrollbar max-h-32 min-h-[34px] md:min-h-[38px]"></textarea>
                    <button type="submit" id="run-btn" class="bg-kite-blue hover:bg-blue-600 text-white p-2 md:p-2.5 rounded focus:outline-none transition-colors shrink-0 mb-0.5 mr-0.5">
                        <i class="ph-bold ph-paper-plane-right text-sm md:text-base"></i>
                    </button>
                </form>
            </footer>
        </main>

        <!-- 3. CONFIGURATION DRAWER (SETTINGS) -->
        <div id="settings-modal" class="fixed inset-y-0 right-0 z-50 w-full max-w-[320px] translate-x-full border-l border-kite-border bg-kite-panel flex flex-col shadow-2xl transition-transform duration-300 ease-in-out">
            <div class="h-14 border-b border-kite-border flex items-center justify-between px-4 bg-kite-bg/30 shrink-0">
                <div class="flex items-center gap-2">
                    <i class="ph-bold ph-cpu text-kite-blue text-sm"></i>
                    <span class="font-bold text-xs uppercase tracking-wider text-zinc-300">SYSTEM ARCHITECT</span>
                </div>
                <button id="close-settings-btn" class="text-zinc-500 hover:text-zinc-100 focus:outline-none">
                    <i class="ph-bold ph-x text-base"></i>
                </button>
            </div>

            <div class="flex-1 p-4 space-y-5 overflow-y-auto custom-scrollbar">
                
                <!-- AI Engine -->
                <div class="space-y-3 pb-4 border-b border-kite-border/60">
                    <label class="block text-[10px] font-bold text-zinc-400 uppercase tracking-widest">Inference Core Router</label>
                    <select id="api-model-select" class="w-full rounded border border-kite-border bg-kite-bg px-3 py-2 text-[16px] md:text-xs text-zinc-200 focus:outline-none focus:border-kite-blue">
                        <option value="google|gemini-3.5-flash">Gemini 3.5 Flash</option>
                        <option value="google|gemini-2.5-pro">Gemini 2.5 Pro</option>
                        <option value="openai|gpt-4o">GPT-4o</option>
                        <option value="anthropic|claude-3-5-sonnet-20241022">Claude 3.5 Sonnet</option>
                    </select>
                    
                    <div id="key-container-google" class="key-container">
                        <input type="password" id="api-key-google" placeholder="Google API Key" class="w-full rounded border border-kite-border bg-kite-bg px-3 py-2 text-[16px] md:text-xs text-zinc-200 focus:outline-none">
                    </div>
                    
                    <div id="key-container-openai" class="key-container hidden">
                        <input type="password" id="api-key-openai" placeholder="OpenAI API Key" class="w-full rounded border border-kite-border bg-kite-bg px-3 py-2 text-[16px] md:text-xs text-zinc-200 focus:outline-none">
                    </div>
                    
                    <div id="key-container-anthropic" class="key-container hidden">
                        <input type="password" id="api-key-anthropic" placeholder="Anthropic API Key" class="w-full rounded border border-kite-border bg-kite-bg px-3 py-2 text-[16px] md:text-xs text-zinc-200 focus:outline-none">
                    </div>
                </div>

                <!-- GitHub Vault -->
                <div class="space-y-3 pb-4 border-b border-kite-border/60">
                    <label class="block text-[10px] font-bold text-kite-green uppercase tracking-widest">GitHub Vault Sync</label>
                    <input type="password" id="git-token-input" placeholder="Personal Access Token" class="w-full rounded border border-kite-border bg-kite-bg px-3 py-2 text-[16px] md:text-xs text-zinc-200 focus:outline-none">
                    
                    <div class="flex gap-2">
                        <input type="text" id="git-user-input" placeholder="Owner" class="w-1/2 rounded border border-kite-border bg-kite-bg px-3 py-2 text-[16px] md:text-xs text-zinc-200 focus:outline-none">
                        <input type="text" id="git-repo-input" placeholder="Repo" class="w-1/2 rounded border border-kite-border bg-kite-bg px-3 py-2 text-[16px] md:text-xs text-zinc-200 focus:outline-none">
                    </div>
                    
                    <div class="flex gap-2 pt-2">
                        <button id="git-pull-btn" class="flex-1 bg-kite-bg border border-kite-border text-blue-400 py-1.5 rounded text-xs font-semibold hover:border-blue-500 flex items-center justify-center gap-1 focus:outline-none transition-colors">
                            <i class="ph ph-download-simple"></i> Pull
                        </button>
                        <button id="git-push-btn" class="flex-1 bg-kite-bg border border-kite-border text-kite-green py-1.5 rounded text-xs font-semibold hover:border-kite-green flex items-center justify-center gap-1 focus:outline-none transition-colors">
                            <i class="ph ph-upload-simple"></i> Push
                        </button>
                    </div>
                </div>

                <button id="save-settings-btn" class="w-full rounded bg-kite-blue py-2 text-xs font-bold text-white transition-colors hover:bg-blue-600 focus:outline-none">
                    Save Config
                </button>
            </div>
        </div>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
