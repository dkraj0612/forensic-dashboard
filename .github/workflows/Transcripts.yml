name: DNA Evolution Analyzer

# This triggers the workflow automatically when new concalls are pushed, 
# or you can run it manually from the GitHub Actions tab.
on:
  push:
    branches:
      - main
    paths:
      - 'ScreenerData/stocks/**/concalls/**'
  workflow_dispatch: 

jobs:
  analyze_concalls:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy textblob

      - name: Run Analyzer on all Tickers
        run: |
          # Loop through every 'concalls' directory in your specific structure
          for concall_dir in ScreenerData/stocks/*/*/concalls; do
            
            # Check if directory exists (handles empty glob matches)
            if [ -d "$concall_dir" ]; then
              
              # Extract the TICKER name (the folder exactly above 'concalls')
              # e.g., from ScreenerData/stocks/0-9/20MICRONS/concalls -> 20MICRONS
              TICKER=$(basename $(dirname "$concall_dir"))
              
              echo "=================================================="
              echo "Starting analysis for: $TICKER"
              echo "Folder path: $concall_dir"
              echo "=================================================="
              
              # Run the python script
              python Transcripts_analyzer.py \
                --folder "$concall_dir" \
                --ticker "$TICKER" \
                --out "analysis_output"
            fi
          done

      - name: Upload Analysis Reports
        uses: actions/upload-artifact@v4
        with:
          name: dna-analysis-reports
          path: analysis_output/
          retention-days: 30
