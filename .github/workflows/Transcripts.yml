name: Run Transcript Analyzer

on:
  # Allows you to trigger the run manually from the GitHub Actions tab
  workflow_dispatch: 
  # Optional: Uncomment the next two lines to run automatically on every push
  # push:
  #   branches: [ "main" ]

jobs:
  run-analysis:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10' 

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # Installing all requirements directly here instead of using a requirements.txt file
          pip install pandas numpy textblob spacy scikit-learn matplotlib seaborn wordcloud
          python -m spacy download en_core_web_sm

      - name: Run Transcript Analyzer
        run: |
          # Make the script executable
          chmod +x Transcripts_analyzer.py
          # Run it, pointing it at the current repo directory
          python Transcripts_analyzer.py --repo-root . --output-dir analysis_output

      - name: Upload Results (Artifacts)
        uses: actions/upload-artifact@v4
        with:
          name: analysis-reports
          path: |
            analysis_output/
            transcript_analysis.db
            transcript_analyzer.log
