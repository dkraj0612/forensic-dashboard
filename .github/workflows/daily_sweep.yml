
name: Master Market Data Pipeline

on:
  schedule:
    - cron: '30 13 * * *'  # Runs daily at 7:00 PM IST (13:30 UTC)
    - cron: '0 16 * * *'   # Fallback run at 9:30 PM IST (16:00 UTC)
    - cron: '0 5 * * 6'    # Weekly Fundamental Sync at 10:30 AM IST (05:00 UTC) Saturday
  workflow_dispatch:        # Allows you to trigger the pipeline manually anytime

permissions:
  contents: write

jobs:
  # --- WEEKLY JOB: FUNDAMENTAL SYNC ---
  sync-fundamentals:
    if: github.event.schedule == '0 5 * * 6'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Dependencies for Sync
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run Fundamental Sync
        run: python fundamental_sync.py

      - name: Commit and Push Fundamentals
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          
          # Safely add the new corporate data fundamentals
          git add corporate_data/
          
          if ! git diff --staged --quiet; then
            git commit -m "chore: weekly fundamentals synced [skip ci]"
            git pull --rebase origin main
            git push origin main
          else
            echo "No new fundamental changes detected."
          fi

  # --- DAILY JOB: INGESTION & AI ANALYSIS ---
  run-master-pipeline:
    if: github.event.schedule != '0 5 * * 6'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0    # Fetches full history so rebasing works perfectly

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'      # Speeds up daily builds by caching installed packages

      - name: Install System and Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests pandas lxml html5lib tabulate yfinance

      # --- STAGE 1: DATA INGESTION ---
      - name: Run Data Ingestion Engine
        run: python data_ingestion.py

      - name: Commit and Push Market Data Securely
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          
          # ARCHITECTURE FIX: Use 'git add .' to safely add whatever the python script generated
          # without crashing if a specific folder wasn't created today.
          git add .
          
          if ! git diff --staged --quiet; then
            git commit -m "chore: exchange data ingestion complete [skip ci]"
            git pull --rebase origin main
            git push origin main
          else
            echo "No new market changes detected."
          fi

      # --- STAGE 2: AI ORCHESTRATION ---
      - name: Run AI Analysis Engine
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python ai_analysis.py

      - name: Commit and Push Final AI Verdicts
        if: always()        # Ensures verdicts are saved even if a specific ticker timed out
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          
          # Safely add the DB only if it exists
          if [ -f master_forensic_db.json ]; then
            git add master_forensic_db.json
            if ! git diff --staged --quiet; then
              git commit -m "chore: master forensic database updated [skip ci]"
              git pull --rebase origin main
              git push origin main
            else
              echo "No new AI verdicts to commit."
            fi
          else
            echo "Database file not found. Skipping commit."
          fi


