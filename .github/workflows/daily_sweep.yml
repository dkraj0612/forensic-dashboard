
name: Master Market Data Pipeline

on:
  schedule:
    # THE PERSISTENT HUNTER: Runs at 13:00, 14:00, 15:00, 16:00, 17:00 UTC 
    # (6:30 PM, 7:30 PM, 8:30 PM, 9:30 PM, 10:30 PM IST)
    - cron: '0 13,14,15,16,17 * * 1-5'
    
    # THE AI ANALYST: Runs strictly at 17:30 UTC (11:00 PM IST)
    - cron: '30 17 * * 1-5'
    
    # WEEKLY SYNC: Saturday 5:00 UTC (10:30 AM IST)
    - cron: '0 5 * * 6'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # --- WEEKLY JOB: FUNDAMENTAL SYNC ---
  sync-fundamentals:
    if: github.event.schedule == '0 5 * * 6'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - uses: actions/setup-python@v5
        with: { python-version: '3.11', cache: 'pip' }
      - run: pip install requests
      - run: python fundamental_sync.py
      - run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add corporate_data/
          if ! git diff --staged --quiet; then
            git commit -m "chore: weekly fundamentals synced [skip ci]"
            git pull --rebase origin main
            git push origin main
          fi

  # --- HOURLY JOB: PERSISTENT HUNTER INGESTION ---
  data-hunter:
    if: github.event.schedule == '0 13,14,15,16,17 * * 1-5' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - uses: actions/setup-python@v5
        with: { python-version: '3.11', cache: 'pip' }
      - name: Install Playwright & Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests playwright
          playwright install chromium
          playwright install-deps
      - name: Run Data Hunter
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python data_ingestion.py
      - name: Commit Captured Data
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add .
          if ! git diff --staged --quiet; then
            git commit -m "chore: hunter captured new market data [skip ci]"
            git pull --rebase origin main
            git push origin main
          fi

  # --- NIGHTLY JOB: AI ANALYSIS ---
  ai-analysis:
    if: github.event.schedule == '30 17 * * 1-5'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - uses: actions/setup-python@v5
        with: { python-version: '3.11', cache: 'pip' }
      - run: pip install requests
      - name: Run AI Analysis
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python ai_analysis.py
      - name: Commit AI Verdicts
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          if [ -f master_forensic_db.json ]; then
            git add master_forensic_db.json
            if ! git diff --staged --quiet; then
              git commit -m "chore: nightly AI verdicts committed [skip ci]"
              git pull --rebase origin main
              git push origin main
            fi
          fi
          
