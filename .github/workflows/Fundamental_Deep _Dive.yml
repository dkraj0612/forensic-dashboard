
name: 5:00 AM Fundamental Deep Dive

on:
  schedule:
    # 23:30 UTC translates exactly to 05:00 AM IST the next morning
    - cron: '30 23 * * *'
  
  workflow_dispatch: # Allows manual triggers

jobs:
  fundamental_analysis:
    runs-on: ubuntu-latest

    steps:
    - name: 📥 Checkout Repository
      uses: actions/checkout@v4
      
    - name: 🐍 Set up Python 3.10
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: ⚙️ Install Quantitative Libraries
      run: |
        python -m pip install --upgrade pip
        pip install curl_cffi pandas beautifulsoup4 google-generativeai lxml

    - name: 🧠 Run Phase 2 Deep Analysis
      env:
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      run: |
        python screener_fundamentals.py

    - name: 💾 Commit and Push HTML Memory Bank & CSV
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "Market Sweeper AI"
        git add market_pulse_data/Fundamentals/
        git commit -m "📊 Auto-Archived Morning Fundamental Analysis" || echo "No new results to commit today"
        git push

