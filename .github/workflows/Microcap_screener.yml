name: Automated Dual-Track Microcap Screener Pipeline

on:
  schedule:
    - cron: '0 0 * * 0'
  workflow_dispatch:

jobs:
  execute-screening-engine:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository Code Base
      uses: actions/checkout@v4

    - name: Set Up Python Environment Runtime
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: Install Runtime Library Dependencies
      run: |
        python -m pip install --upgrade pip
        # Added pymupdf (fitz) and google-generativeai for the AI concall parser
        pip install requests beautifulsoup4 pandas pymupdf google-generativeai

    - name: Run Processing Engine Pipeline
      env:
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        # Added the Gemini API Key secret for the Tier-1 structural parser
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      run: |
        python Stock_filtering_HighGrowth.py

    - name: Enforce Data Lake Repository Rules
      run: |
        # Actively prevents the binary database from bloating the GitHub repository
        echo "*.db" >> .gitignore
        git rm --cached ScreenerData/screener_data.db || true
        git rm --cached screener_data.db || true

    - name: Commit and Push Output Artifacts
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        
        # Safely add each legacy file individually. 
        git add qualified_stocks_analysis.csv || true
        git add previous_qualified_stocks.csv || true
        
        # Safely track our existing fundamental analysis folders 
        git add market_pulse_data/ || true
        
        # Safely track the NEW master directory (contains the dynamic CSVs, JSON transcripts, and Telegram Logs)
        git add ScreenerData/ || true
        
        if git diff --staged --quiet; then
          echo "No changes detected."
        else
          git commit -m "Auto-Update: Screening Output [$(date -u +'%Y-%m-%d UTC')]"
          git push
        fi
