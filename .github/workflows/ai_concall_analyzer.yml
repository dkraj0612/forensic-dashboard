name: Concall Analysis Pipeline By AI

on:
  schedule:
    # Runs at 00:00 UTC every day. Adjust the cron timing as needed.
    - cron: '0 0 * * *'
  workflow_dispatch: 
    # Allows you to click a "Run workflow" button manually in the GitHub UI

jobs:
  analyze_transcripts:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install google-generativeai

      - name: Run Pipeline Script
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          # Replace 'run_pipeline.py' with the actual name of your script
          python run_pipeline.py 

      - name: Commit and Push Generated Summaries
        run: |
          # Configure the GitHub Actions Bot Git identity
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Stage the newly created summaries and the JSON state file
          git add concalls/*_Summary.md
          git add concalls/pipeline_progress_state.json
          git add pipeline_execution.log
          
          # Check if there are actually changes to commit
          if ! git diff-index --quiet HEAD; then
            # The [skip ci] tag ensures pushing this commit doesn't accidentally trigger another workflow run
            git commit -m "chore: auto-generate new transcript summaries and update state [skip ci]"
            git push
          else
            echo "No new summaries generated. Nothing to commit."
          fi
