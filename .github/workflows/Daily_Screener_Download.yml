name: Enterprise Market Sweeper

on:
  schedule:
    # Runs at 13:30 UTC every day (which is 7:00 PM IST)
    - cron: '30 13 * * *'
  workflow_dispatch: # Allows manual trigger

permissions:
  contents: write # Allows the bot to save files back to your repository

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        # Playwright is gone! Added PyMuPDF and Textstat
        run: |
          python -m pip install --upgrade pip
          pip install curl_cffi pandas beautifulsoup4 pymupdf textstat

      - name: Execute Sweeper & NLP Engine
        env:
          # Securely injects your Telegram credentials
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python screener_daily_feed.py

      - name: Commit and Push Data
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add market_pulse_data/* || true
          git commit -m "Automated Market Sweep: $(date +'%Y-%m-%d')" || true
          git push
