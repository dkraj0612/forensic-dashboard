
name: Enterprise Market Sweeper

on:
  schedule:
    # Runs at 13:30 UTC every day (which is 7:00 PM IST)
    - cron: '30 13 * * *'
  workflow_dispatch: # Allows manual trigger

permissions:
  contents: write # Allows the bot to save files back to your repository

# PREVENTS CRASHES: Stops two runners from pushing to Git at the exact same time
concurrency:
  group: market-sweeper
  cancel-in-progress: true

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      # CACHE: Save Docling & HuggingFace Models so it doesn't download 3GB every day
      - name: Cache AI Vision Models
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/huggingface
            ~/.cache/docling
          # Static key ensures it reuses the same cached models across daily runs
          key: ${{ runner.os }}-ai-models-v1
          
      - name: Install Dependencies
        # Added google-generativeai for the Multimodal AI analysis AND docling
        run: |
          python -m pip install --upgrade pip
          pip install curl_cffi pandas beautifulsoup4 pymupdf textstat google-generativeai docling

      - name: Execute Sweeper & NLP Engine
        env:
          # Securely injects your Telegram and Gemini AI credentials
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python screener_daily_feed.py

      - name: Commit and Push Data
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add market_pulse_data/* || true
          git commit -m "Automated Market Sweep: $(date +'%Y-%m-%d')" || true
          git push
