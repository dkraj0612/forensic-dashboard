name: Daily Market Pulse Downloader

on:
  schedule:
    # Runs at 13:30 UTC every day (which is 7:00 PM IST)
    - cron: '30 13 * * *'
  workflow_dispatch: # Allows you to run it manually by clicking a button

permissions:
  contents: write # Allows the bot to save files back to your repository

jobs:
  scrape-and-download:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies and Headless Browser
        run: |
          python -m pip install --upgrade pip
          pip install  curl_cffi beautifulsoup4          

      - name: Run Market Pulse Extractor
        env:
          # Passes your native credentials to the Playwright browser
          SCREENER_USERNAME: ${{ secrets.SCREENER_USERNAME }}
          SCREENER_PASSWORD: ${{ secrets.SCREENER_PASSWORD }}
        run: python screener_daily_feed.py

      - name: Commit and Push Downloaded Data
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add market_pulse_data/* || true
          git commit -m "Automated Market Data Update: $(date +'%Y-%m-%d')" || true
          git push
